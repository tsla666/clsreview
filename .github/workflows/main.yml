name: 财联社焦点复盘分析

on:
  # 定时触发，每天下午6:15和早上5点运行
  schedule:
    - cron: '15 10 * * 1-5'  # UTC时间，对应北京时间18:15，周一到周五
    - cron: '0 21 * * 1-5'  # UTC时间，对应北京时间5:00，周一到周五
  # 手动触发
  workflow_dispatch:

jobs:
  run-cls-review:
    runs-on: ubuntu-latest
     env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          feishu_webhook: ${{ secrets.feishu_webhook }}
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装Node.js依赖
        run: npm install
      
      - name: 安装Python依赖
        run: pip install requests beautifulsoup4
      
      - name: 运行财联社焦点复盘分析
        run: node index.js
       
